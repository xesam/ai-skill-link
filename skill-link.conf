# skill-link default configuration
# This file is committed to the repository and defines default settings.
# To add or override settings, create skill-link.local.conf alongside this file.

# ============================================================================
# [repo] - Skills Repository Configuration
# ============================================================================
# Define named repositories for organizing skills from different sources.
#
# Usage:
#   - 'default' is special: used when --repo parameter is not specified
#   - Other names: custom named repos, referenced via --repo <name>
#   - Paths starting with ~ are expanded to user home directory
#
# Priority: command-line --repo > config [repo] default > script directory
#
# Examples:
#   [repo]
#   default = ~/my-skills
#   work    = ~/work-skills
#   oss     = ~/opensource-skills
#
# Then use:
#   ./skill-link --list                    # uses 'default' repo
#   ./skill-link --list --repo work        # uses 'work' repo
#   ./skill-link --list --repo /tmp/test   # uses temporary path

# [repo]
# default = ~/my-skills

# ============================================================================
# [clis] - AI CLI Tools Configuration
# ============================================================================
# Define AI CLI tools and their skills directory paths.
#
# Format: <cli-name> = <path-to-skills-directory>
#   - Paths starting with ~ are expanded to user home directory
#   - Use --list-clis to see current merged configuration
#   - Use --cli all to operate on all configured CLI tools
#
# Built-in CLI tools:

[clis]
codex       = ~/.codex/skills
claude-code = ~/.claude/skills
gemini      = ~/.gemini/skills
qwen-code   = ~/.qwen/skills

# ============================================================================
# Custom Configuration
# ============================================================================
# To customize settings without modifying this file:
#
# 1. Create skill-link.local.conf in the same directory
# 2. Add your custom settings (entries override defaults)
# 3. The file is gitignored and won't be committed
#
# Example skill-link.local.conf:
#
#   [repo]
#   default = ~/my-skills
#   work    = ~/work-skills
#
#   [clis]
#   cursor  = ~/.cursor/skills
#   my-tool = ~/path/to/my-tool/skills
